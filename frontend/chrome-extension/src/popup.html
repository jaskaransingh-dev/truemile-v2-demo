<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TrueMile DAT Ingest</title>
    <style>
      body { font-family: Arial, sans-serif; width: 340px; margin: 0; padding: 12px; }
      h3 { margin: 0 0 10px 0; }
      label { display: block; font-size: 12px; margin: 8px 0 4px; }
      input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 12px; }
      button { margin-top: 12px; width: 100%; padding: 10px; cursor: pointer; }
      #status { margin-top: 10px; font-size: 12px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h3>TrueMile DAT Ingest</h3>
    <label for="apiUrl">API URL</label>
    <input id="apiUrl" placeholder="https://api.truemile.ai" />
    <label for="extensionKey">Extension Key</label>
    <input id="extensionKey" placeholder="Paste extension key" />
    <button id="saveBtn">Save Settings</button>
    <button id="runBtn">Run Dispatch Ingest Now</button>
    <div id="status"></div>

    <script src="../api/backend-client.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
