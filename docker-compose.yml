services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - backend_nm:/app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      API_TARGET: http://backend:3000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  backend_nm:
  frontend_nm:
