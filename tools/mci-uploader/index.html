<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DAT MCI Uploader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 32px 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .card { background: #1e2130; border: 1px solid #2d3348; border-radius: 10px; padding: 24px; max-width: 680px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .row { display: flex; gap: 16px; margin-bottom: 18px; }
    .field { flex: 1; }
    .toggle-group { display: flex; gap: 0; border: 1px solid #2d3348; border-radius: 6px; overflow: hidden; }
    .toggle-group button { flex: 1; padding: 8px 0; background: #151826; border: none; color: #64748b; font-size: 13px; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .toggle-group button.active { background: #3b82f6; color: #fff; font-weight: 600; }
    input[type="date"] { width: 100%; padding: 8px 10px; background: #151826; border: 1px solid #2d3348; border-radius: 6px; color: #e2e8f0; font-size: 13px; }
    input[type="date"]:focus { outline: none; border-color: #3b82f6; }
    .drop-zone { border: 2px dashed #2d3348; border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; margin-bottom: 18px; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
    .drop-zone .icon { font-size: 28px; margin-bottom: 8px; }
    .drop-zone p { font-size: 13px; color: #64748b; }
    .drop-zone p strong { color: #94a3b8; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 18px; }
    .preview-item { position: relative; border-radius: 6px; overflow: hidden; border: 1px solid #2d3348; }
    .preview-item img { width: 100%; height: 90px; object-fit: cover; display: block; }
    .preview-item .remove { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); border: none; color: #fff; border-radius: 4px; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .preview-item .fname { padding: 4px 6px; font-size: 10px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    button.submit { width: 100%; padding: 11px; background: #3b82f6; border: none; border-radius: 7px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    button.submit:hover { background: #2563eb; }
    button.submit:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .status { margin-top: 18px; font-size: 13px; }
    .status.error { color: #f87171; }
    .status.success { color: #34d399; }
    .status.loading { color: #94a3b8; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
    th { text-align: left; padding: 7px 10px; background: #151826; color: #64748b; font-weight: 500; border-bottom: 1px solid #2d3348; }
    td { padding: 6px 10px; border-bottom: 1px solid #1a1f2e; }
    tr:last-child td { border-bottom: none; }
    .mci-pos { color: #34d399; }
    .mci-neg { color: #f87171; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-tight    { background: #fef9c3; color: #854d0e; }
    .badge-balanced { background: #dbeafe; color: #1e40af; }
    .badge-loose    { background: #fee2e2; color: #991b1b; }
    .badge-neutral  { background: #f1f5f9; color: #475569; }
    .api-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
    .api-row input { flex: 1; padding: 7px 10px; background: #151826; border: 1px solid #2d3348; border-radius: 6px; color: #94a3b8; font-size: 12px; }
    .api-row input:focus { outline: none; border-color: #3b82f6; color: #e2e8f0; }
  </style>
</head>
<body>

<h1>DAT MCI Uploader</h1>
<p class="subtitle">Upload DAT iQ Market Conditions Index screenshots → auto-parse → upsert MarketSnapshot</p>

<div class="card">

  <!-- API base URL (dev convenience) -->
  <div class="api-row">
    <label style="margin:0;white-space:nowrap">API URL</label>
    <input type="text" id="apiBase" value="http://localhost:3000" />
  </div>

  <div class="row">
    <div class="field">
      <label>Equipment Type</label>
      <div class="toggle-group" id="equipToggle">
        <button data-val="DRY_VAN" class="active">Dry Van</button>
        <button data-val="REEFER">Reefer</button>
        <button data-val="FLATBED">Flatbed</button>
      </div>
    </div>
    <div class="field">
      <label>Valid Date</label>
      <input type="date" id="validDate" />
    </div>
  </div>

  <label>Screenshots (1–4 images)</label>
  <div class="drop-zone" id="dropZone">
    <div class="icon">📸</div>
    <p><strong>Drop screenshots here</strong> or click to browse</p>
    <p>PNG, JPG, WEBP · max 10 MB each</p>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  </div>

  <div class="preview-grid" id="previewGrid"></div>

  <button class="submit" id="submitBtn" disabled>Upload &amp; Parse</button>

  <div class="status" id="status"></div>
  <div id="resultsWrap"></div>

</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let selectedFiles = [];
  let equipmentType = 'DRY_VAN';

  // ── Default today's date ──────────────────────────────────────────────────
  const today = new Date().toISOString().substring(0, 10);
  document.getElementById('validDate').value = today;

  // ── Equipment toggle ──────────────────────────────────────────────────────
  document.getElementById('equipToggle').addEventListener('click', e => {
    const btn = e.target.closest('button[data-val]');
    if (!btn) return;
    equipmentType = btn.dataset.val;
    document.querySelectorAll('#equipToggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  // ── Drop zone ─────────────────────────────────────────────────────────────
  const dropZone  = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(Array.from(e.dataTransfer.files));
  });
  fileInput.addEventListener('change', () => {
    addFiles(Array.from(fileInput.files));
    fileInput.value = '';
  });

  function addFiles(incoming) {
    const allowed = incoming.filter(f => f.type.startsWith('image/') && f.size <= 10 * 1024 * 1024);
    selectedFiles = [...selectedFiles, ...allowed].slice(0, 4);
    renderPreviews();
    updateSubmit();
  }

  function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderPreviews();
    updateSubmit();
  }

  function renderPreviews() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
      const url  = URL.createObjectURL(file);
      const item = document.createElement('div');
      item.className = 'preview-item';
      item.innerHTML = `
        <img src="${url}" alt="${file.name}">
        <button class="remove" onclick="removeFile(${idx})">✕</button>
        <div class="fname">${file.name}</div>`;
      grid.appendChild(item);
    });
  }

  function updateSubmit() {
    document.getElementById('submitBtn').disabled = selectedFiles.length === 0;
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const validDate = document.getElementById('validDate').value;
    const apiBase   = document.getElementById('apiBase').value.replace(/\/$/, '');
    const statusEl  = document.getElementById('status');
    const resultsEl = document.getElementById('resultsWrap');

    if (!validDate) { statusEl.className = 'status error'; statusEl.textContent = 'Select a valid date first.'; return; }
    if (selectedFiles.length === 0) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    statusEl.className = 'status loading';
    statusEl.textContent = `Uploading ${selectedFiles.length} screenshot(s)… parsing with Vision…`;
    resultsEl.innerHTML = '';

    const form = new FormData();
    selectedFiles.forEach(f => form.append('files', f));
    form.append('equipment_type', equipmentType);
    form.append('valid_date', validDate);

    try {
      const resp = await fetch(`${apiBase}/api/integrations/dat/market-snapshot/upload`, {
        method: 'POST',
        body: form,
      });
      const data = await resp.json();
      if (!resp.ok) {
        statusEl.className = 'status error';
        statusEl.textContent = `Error ${resp.status}: ${data.error || 'Unknown error'}`;
        return;
      }
      statusEl.className = 'status success';
      statusEl.textContent = `✓ ${data.inserted} row(s) upserted${data.failed > 0 ? ` · ${data.failed} failed` : ''}`;
      if (data.rows && data.rows.length > 0) renderTable(data.rows, resultsEl);
    } catch (err) {
      statusEl.className = 'status error';
      statusEl.textContent = `Network error: ${err.message}`;
    } finally {
      btn.disabled = selectedFiles.length === 0;
    }
  });

  // ── Results table ─────────────────────────────────────────────────────────
  function mciCell(val) {
    if (val == null) return '<td style="color:#475569">—</td>';
    const cls = val > 0 ? 'mci-pos' : val < 0 ? 'mci-neg' : '';
    return `<td class="${cls}">${val > 0 ? '+' : ''}${val}</td>`;
  }

  function badgeCell(label) {
    const map = { Tight: 'tight', Balanced: 'balanced', Loose: 'loose', Neutral: 'neutral' };
    const key = map[label] || 'neutral';
    return `<td><span class="badge badge-${key}">${label || 'Neutral'}</span></td>`;
  }

  function renderTable(rows, container) {
    const html = `
      <table>
        <thead>
          <tr>
            <th>City</th><th>ST</th><th>Outbound MCI</th><th>Inbound MCI</th>
            <th>Capacity</th><th>L/T Ratio</th><th>Rej %</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${r.city}</td>
              <td>${r.state}</td>
              ${mciCell(r.outbound_mci)}
              ${mciCell(r.inbound_mci)}
              ${badgeCell(r.capacity_label)}
              <td>${r.lt_ratio != null ? r.lt_ratio : '—'}</td>
              <td>${r.rejection_rate != null ? r.rejection_rate + '%' : '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
    container.innerHTML = html;
  }
</script>
</body>
</html>
